name: ci-gate

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: src

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test
        run: pytest -q

      - name: Coverage gate
        run: pytest --cov=src --cov-fail-under=70 --cov-config=.coveragerc -q

      - name: Run benchmark
        run: python scripts/run_benchmark.py --out artifacts

      - name: Evaluate gate
        run: |
          python scripts/evaluate_gates.py \
            --baseline artifacts/baseline_metrics.json \
            --optimized artifacts/optimized_metrics.json \
            --out artifacts/gate_result.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gate-artifacts
          path: artifacts/
